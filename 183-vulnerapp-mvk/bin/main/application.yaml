spring:
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: jdbc:h2:mem:mydb
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
    properties:
      jakarta:
        persistence:
          validation:
            mode: AUTO
  web:
    resources:
      static-locations:
        - file:src/main/resources/static/
        - classpath:/static/
    error:
      include-stacktrace: never
      include-message: never
      include-exception: false
      include-binding-errors: never
server:
  error:
    whitelabel:
      enabled: false
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict
        secure: false
logging:
  pattern:
    dateformat: HH:mm:ss
  level:
    org.hibernate.SQL: INFO
    org.springframework.security.web.csrf: INFO
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
